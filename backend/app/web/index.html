<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f5a64" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/app/styles.css" />
    <title>Reader System</title>
  </head>
  <body>
    <header>
      <h1>Reader System</h1>
      <span id="sync-status">Idle</span>
    </header>
    <main>
      <section class="panel">
        <h2>Profile / Auth</h2>
        <input id="email" placeholder="you@example.com" />
        <div class="stack-actions">
          <button id="send-magic">Send Magic Link</button>
          <button id="dev-login" class="secondary">Dev Login</button>
        </div>

        <h2>Add Book</h2>
        <form id="upload-form">
          <input id="upload-title" placeholder="Book title" required />
          <input id="upload-author" placeholder="Author" value="Unknown" />
          <input id="upload-series" placeholder="Series (optional)" />
          <select id="upload-visibility">
            <option value="private" selected>Private</option>
            <option value="shared">Shared</option>
          </select>
          <input id="upload-file" type="file" accept=".epub,.fb2,.pdf" required />
          <button type="submit">Upload Book</button>
        </form>

        <h2>Library</h2>
        <div id="library-list"></div>
      </section>
      <section class="panel">
        <h2>Reader</h2>
        <div id="reader-content"></div>
        <div class="reader-controls">
          <button id="prev">Prev</button>
          <button id="next">Next</button>
        </div>
      </section>
    </main>
    <script src="/app/app.js"></script>
  </body>
</html>
